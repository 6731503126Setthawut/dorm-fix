name: Dormfix
description: Dormitory Maintenance Reporting App
publish_to: 'none'
version: 1.0.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  provider: ^6.1.2
  go_router: ^13.2.0


  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.1+2


  image_picker: ^1.1.2
  cached_network_image: ^3.3.1


  intl: ^0.19.0
  uuid: ^4.4.2
  google_sign_in: ^6.2.1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/